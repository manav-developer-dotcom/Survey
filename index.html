<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SurveyFlow — Survey Progress Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --card: #1c2030;
    --card-hover: #222840;
    --border: #2a2f45;
    --accent: #6c63ff;
    --accent2: #ff6b9d;
    --accent3: #43e8a0;
    --text: #e8eaf2;
    --muted: #7a7f9a;
    --danger: #ff5252;
    --warn: #ffc107;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background mesh */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(108,99,255,.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 35% at 80% 90%, rgba(255,107,157,.08) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 60% 50%, rgba(67,232,160,.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px; }

  /* ── HEADER ── */
  header {
    padding: 28px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-icon {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
  .logo-text span { color: var(--accent); }

  .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 10px 20px; border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; border: none; transition: all .18s ease;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 4px 18px rgba(108,99,255,.35);
  }
  .btn-primary:hover { background: #7b74ff; transform: translateY(-1px); box-shadow: 0 6px 22px rgba(108,99,255,.45); }
  .btn-secondary {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--card-hover); border-color: var(--accent); }
  .btn-danger { background: rgba(255,82,82,.15); color: var(--danger); border: 1px solid rgba(255,82,82,.3); }
  .btn-danger:hover { background: rgba(255,82,82,.25); }
  .btn-sm { padding: 7px 13px; font-size: 13px; }
  .btn-icon { padding: 8px; border-radius: var(--radius-sm); }

  /* ── PROJECT TABS ── */
  .project-nav-wrap {
    margin-top: 28px;
    display: flex; align-items: center; gap: 10px;
    overflow-x: auto; padding-bottom: 4px;
  }
  .project-nav-wrap::-webkit-scrollbar { height: 3px; }
  .project-nav-wrap::-webkit-scrollbar-track { background: transparent; }
  .project-nav-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .proj-tab {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 18px; border-radius: 99px; font-size: 14px; font-weight: 500;
    cursor: pointer; border: 1.5px solid var(--border); background: var(--surface);
    color: var(--muted); white-space: nowrap; transition: all .18s;
    font-family: 'DM Sans', sans-serif;
  }
  .proj-tab:hover { border-color: var(--accent); color: var(--text); }
  .proj-tab.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
    box-shadow: 0 3px 14px rgba(108,99,255,.35);
  }
  .proj-tab .proj-count {
    background: rgba(255,255,255,.2); border-radius: 99px;
    padding: 1px 8px; font-size: 11px; font-weight: 600;
  }
  .proj-tab:not(.active) .proj-count {
    background: var(--border); color: var(--muted);
  }
  .proj-tab-del {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(255,255,255,.15); border: none; cursor: pointer;
    color: inherit; font-size: 11px; transition: background .15s;
    margin-left: 2px;
  }
  .proj-tab-del:hover { background: var(--danger); color: #fff; }

  /* ── STATS BAR ── */
  .stats-bar {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px; margin-top: 24px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 22px;
    display: flex; flex-direction: column; gap: 6px;
    transition: transform .2s, border-color .2s;
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--accent-glow, var(--accent)) 0%, transparent 80%);
    opacity: .06;
  }
  .stat-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; }
  .stat-sub { font-size: 12px; color: var(--muted); }
  .stat-done { --accent-glow: #43e8a0; }
  .stat-done .stat-value { color: var(--accent3); }
  .stat-pending { --accent-glow: #ffc107; }
  .stat-pending .stat-value { color: var(--warn); }
  .stat-total { --accent-glow: #6c63ff; }
  .stat-total .stat-value { color: var(--accent); }

  /* ── PROGRESS BAR ── */
  .prog-wrap { margin-top: 18px; }
  .prog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .prog-title { font-size: 14px; font-weight: 500; color: var(--muted); }
  .prog-pct { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--accent); }
  .prog-bar-bg {
    height: 10px; border-radius: 99px; background: var(--card);
    border: 1px solid var(--border); overflow: hidden;
  }
  .prog-bar-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    transition: width .6s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 12px rgba(108,99,255,.5);
  }

  /* ── CONTROLS ── */
  .controls-row {
    display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; align-items: center;
  }
  .search-box {
    flex: 1; min-width: 200px;
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    transition: border-color .18s;
    display: flex; align-items: center; gap: 10px;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box input {
    background: none; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; flex: 1;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-icon { color: var(--muted); font-size: 16px; }

  .filter-btn {
    padding: 10px 14px; border-radius: var(--radius-sm);
    background: var(--card); border: 1.5px solid var(--border);
    color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; transition: all .18s;
  }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); }

  /* ── RESPONDENT TABLE ── */
  .table-wrap {
    margin-top: 18px; background: var(--card);
    border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden;
  }
  .table-head {
    display: grid; grid-template-columns: 2fr 1.4fr 1.2fr 1fr auto;
    padding: 13px 20px; border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: .07em; gap: 12px;
  }
  .resp-row {
    display: grid; grid-template-columns: 2fr 1.4fr 1.2fr 1fr auto;
    padding: 15px 20px; border-bottom: 1px solid var(--border);
    gap: 12px; align-items: center;
    transition: background .15s; cursor: default;
    animation: rowIn .25s ease both;
  }
  .resp-row:last-child { border-bottom: none; }
  .resp-row:hover { background: var(--card-hover); }
  @keyframes rowIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .resp-name { display: flex; align-items: center; gap: 11px; font-weight: 500; }
  .avatar {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; font-family: 'Syne', sans-serif;
    flex-shrink: 0;
  }
  .resp-email { color: var(--muted); font-size: 13px; }
  .resp-contact { font-size: 13px; color: var(--muted); }
  .resp-date { font-size: 13px; color: var(--muted); }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 11px; border-radius: 99px; font-size: 12px; font-weight: 600;
  }
  .badge-done { background: rgba(67,232,160,.12); color: var(--accent3); border: 1px solid rgba(67,232,160,.3); }
  .badge-pending { background: rgba(255,193,7,.1); color: var(--warn); border: 1px solid rgba(255,193,7,.3); }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .row-actions { display: flex; gap: 6px; }

  /* ── EMPTY STATE ── */
  .empty {
    padding: 60px 20px; text-align: center; color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 14px; opacity: .5; }
  .empty h3 { font-family: 'Syne', sans-serif; font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* ── MODAL ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(5,7,12,.75); backdrop-filter: blur(6px);
    z-index: 100; align-items: center; justify-content: center; padding: 20px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 32px; width: 100%; max-width: 480px;
    box-shadow: 0 30px 80px rgba(0,0,0,.6);
    animation: modalIn .25s cubic-bezier(.34,1.4,.64,1) both;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(.92) translateY(16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-title {
    font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
    margin-bottom: 22px; display: flex; align-items: center; gap: 10px;
  }
  .modal-title .icon { font-size: 22px; }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 7px; }
  .form-input, .form-select {
    width: 100%; padding: 11px 14px;
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    transition: border-color .18s; outline: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select { cursor: pointer; }
  .form-select option { background: var(--card); }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* ── TOAST ── */
  .toast-wrap { position: fixed; bottom: 28px; right: 28px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
  .toast {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 13px 18px;
    font-size: 14px; display: flex; align-items: center; gap: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,.5);
    animation: toastIn .3s ease both;
    max-width: 300px;
  }
  .toast.hide { animation: toastOut .3s ease both; }
  @keyframes toastIn  { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes toastOut { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(16px); } }

  /* ── MISC ── */
  .section-title {
    font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700;
    margin: 28px 0 0; display: flex; align-items: center; gap: 10px;
  }
  .section-title .pill {
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 99px;
    background: rgba(108,99,255,.15); color: var(--accent); border: 1px solid rgba(108,99,255,.3);
  }

  .no-projects {
    text-align: center; padding: 80px 20px; color: var(--muted);
  }
  .no-projects h2 { font-family: 'Syne', sans-serif; font-size: 24px; color: var(--text); margin-bottom: 10px; }

  @media (max-width: 680px) {
    .table-head, .resp-row { grid-template-columns: 1fr auto; }
    .table-head .col-email,
    .table-head .col-contact,
    .table-head .col-date,
    .resp-email,
    .resp-contact,
    .resp-date { display: none; }
    .stats-bar { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="logo">
      <div class="logo-icon">📋</div>
      <div class="logo-text">Survey<span>Flow</span></div>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="openProjectModal()">＋ New Project</button>
      <button class="btn btn-primary" onclick="openRespondentModal()">＋ Add Respondent</button>
    </div>
  </header>

  <!-- Project Tabs -->
  <div class="project-nav-wrap" id="projectNav"></div>

  <!-- Main content -->
  <div id="mainContent"></div>

</div>

<!-- Toast container -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- Add/Edit Respondent Modal -->
<div class="overlay" id="respondentModal">
  <div class="modal">
    <div class="modal-title"><span class="icon">👤</span> <span id="respModalTitle">Add Respondent</span></div>
    <div class="form-group">
      <label class="form-label">Full Name *</label>
      <input class="form-input" id="inp-name" placeholder="e.g. Ananya Sharma" />
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" id="inp-email" type="email" placeholder="e.g. ananya@email.com" />
    </div>
    <div class="form-group">
      <label class="form-label">Contact / Phone</label>
      <input class="form-input" id="inp-contact" placeholder="e.g. +91 98765 43210" />
    </div>
    <div class="form-group">
      <label class="form-label">Project</label>
      <select class="form-select" id="inp-project"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-select" id="inp-status">
        <option value="pending">⏳ Pending</option>
        <option value="done">✅ Completed</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRespondent()">Save</button>
    </div>
  </div>
</div>

<!-- Add Project Modal -->
<div class="overlay" id="projectModal">
  <div class="modal">
    <div class="modal-title"><span class="icon">📁</span> New Project</div>
    <div class="form-group">
      <label class="form-label">Project Name *</label>
      <input class="form-input" id="inp-proj-name" placeholder="e.g. Customer Satisfaction Q2" />
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input class="form-input" id="inp-proj-desc" placeholder="Short description..." />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProject()">Create Project</button>
    </div>
  </div>
</div>

<script>
/* ─────────────────────────── STATE ─────────────────────────── */
let state = JSON.parse(localStorage.getItem('surveyflow') || 'null') || {
  projects: [
    { id: 'p1', name: 'Customer Satisfaction Q2', desc: 'Main quarterly survey' }
  ],
  respondents: [
    { id: 'r1', name: 'Ananya Sharma', email: 'ananya@example.com', contact: '+91 98765 43210', projectId: 'p1', status: 'done', added: '2026-04-10' },
    { id: 'r2', name: 'Ravi Mehta',    email: 'ravi@example.com',   contact: '+91 91234 56789', projectId: 'p1', status: 'pending', added: '2026-04-11' },
    { id: 'r3', name: 'Priya Kapoor',  email: 'priya@example.com',  contact: '',                projectId: 'p1', status: 'pending', added: '2026-04-12' },
  ],
  activeProject: 'p1'
};

let editingId = null;
let filterStatus = 'all';
let searchQ = '';

function save() { localStorage.setItem('surveyflow', JSON.stringify(state)); }

/* ─────────────────────────── RENDER ─────────────────────────── */
function render() {
  save();
  renderTabs();
  renderContent();
}

const COLORS = [
  ['#6c63ff','#fff'],['#ff6b9d','#fff'],['#43e8a0','#0d0f14'],
  ['#ffc107','#0d0f14'],['#00bcd4','#fff'],['#e040fb','#fff']
];
function avatarColor(name) {
  let h = 0; for (let c of name) h = (h*31 + c.charCodeAt(0)) % COLORS.length;
  return COLORS[h];
}
function initials(name) { return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—'; }

function renderTabs() {
  const nav = document.getElementById('projectNav');
  nav.innerHTML = '';
  if (!state.projects.length) return;
  state.projects.forEach(p => {
    const count = state.respondents.filter(r=>r.projectId===p.id).length;
    const tab = document.createElement('button');
    tab.className = 'proj-tab' + (p.id === state.activeProject ? ' active' : '');
    tab.innerHTML = `${p.name}<span class="proj-count">${count}</span><button class="proj-tab-del" title="Delete project" onclick="deleteProject('${p.id}',event)">✕</button>`;
    tab.addEventListener('click', () => { state.activeProject = p.id; filterStatus='all'; searchQ=''; render(); });
    nav.appendChild(tab);
  });
}

function renderContent() {
  const el = document.getElementById('mainContent');

  if (!state.projects.length) {
    el.innerHTML = `<div class="no-projects"><div style="font-size:56px;margin-bottom:16px">📭</div><h2>No projects yet</h2><p style="color:var(--muted);margin-bottom:20px">Create a project to start tracking respondents.</p><button class="btn btn-primary" onclick="openProjectModal()">＋ Create First Project</button></div>`;
    return;
  }

  const proj = state.projects.find(p=>p.id===state.activeProject);
  if (!proj) { state.activeProject = state.projects[0].id; renderContent(); return; }

  const all = state.respondents.filter(r=>r.projectId===proj.id);
  const done = all.filter(r=>r.status==='done').length;
  const pending = all.length - done;
  const pct = all.length ? Math.round(done/all.length*100) : 0;

  let filtered = all;
  if (filterStatus !== 'all') filtered = filtered.filter(r=>r.status===filterStatus);
  if (searchQ) filtered = filtered.filter(r=>(r.name+r.email+r.contact).toLowerCase().includes(searchQ.toLowerCase()));

  el.innerHTML = `
    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-card stat-total">
        <div class="stat-label">Total Respondents</div>
        <div class="stat-value">${all.length}</div>
        <div class="stat-sub">${proj.desc||'No description'}</div>
      </div>
      <div class="stat-card stat-done">
        <div class="stat-label">Completed</div>
        <div class="stat-value">${done}</div>
        <div class="stat-sub">Surveys finished</div>
      </div>
      <div class="stat-card stat-pending">
        <div class="stat-label">Pending</div>
        <div class="stat-value">${pending}</div>
        <div class="stat-sub">Yet to respond</div>
      </div>
    </div>

    <!-- Progress -->
    <div class="prog-wrap">
      <div class="prog-header">
        <span class="prog-title">Completion Progress</span>
        <span class="prog-pct">${pct}%</span>
      </div>
      <div class="prog-bar-bg">
        <div class="prog-bar-fill" style="width:${pct}%"></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-row">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input id="searchInput" placeholder="Search respondents..." value="${searchQ}" oninput="searchQ=this.value;renderContent()" />
      </div>
      <button class="filter-btn ${filterStatus==='all'?'active':''}" onclick="filterStatus='all';renderContent()">All (${all.length})</button>
      <button class="filter-btn ${filterStatus==='done'?'active':''}" onclick="filterStatus='done';renderContent()">✅ Done (${done})</button>
      <button class="filter-btn ${filterStatus==='pending'?'active':''}" onclick="filterStatus='pending';renderContent()">⏳ Pending (${pending})</button>
    </div>

    <!-- Table -->
    <div class="section-title">Respondents <span class="pill">${filtered.length} shown</span></div>
    <div class="table-wrap">
      <div class="table-head">
        <div>Name</div>
        <div class="col-email">Email</div>
        <div class="col-contact">Contact</div>
        <div class="col-date">Added</div>
        <div>Status / Actions</div>
      </div>
      <div id="respBody">${filtered.length ? '' : '<div class="empty"><div class="empty-icon">🧑‍💻</div><h3>No respondents found</h3><p>Try a different filter or add new respondents.</p></div>'}</div>
    </div>
  `;

  const body = document.getElementById('respBody');
  filtered.forEach(r => {
    const [bg, fg] = avatarColor(r.name);
    const row = document.createElement('div');
    row.className = 'resp-row';
    row.innerHTML = `
      <div class="resp-name">
        <div class="avatar" style="background:${bg};color:${fg}">${initials(r.name)}</div>
        <div><div>${r.name}</div></div>
      </div>
      <div class="resp-email col-email">${r.email||'—'}</div>
      <div class="resp-contact col-contact">${r.contact||'—'}</div>
      <div class="resp-date col-date">${fmtDate(r.added)}</div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="badge ${r.status==='done'?'badge-done':'badge-pending'}">
          <span class="badge-dot"></span>${r.status==='done'?'Completed':'Pending'}
        </span>
        <div class="row-actions">
          <button class="btn btn-sm btn-secondary btn-icon" title="Toggle status" onclick="toggleStatus('${r.id}')">🔄</button>
          <button class="btn btn-sm btn-secondary btn-icon" title="Edit" onclick="editRespondent('${r.id}')">✏️</button>
          <button class="btn btn-sm btn-danger btn-icon" title="Remove" onclick="deleteRespondent('${r.id}')">🗑</button>
        </div>
      </div>
    `;
    body.appendChild(row);
  });
}

/* ─────────────────────────── ACTIONS ─────────────────────────── */
function toggleStatus(id) {
  const r = state.respondents.find(x=>x.id===id);
  if (!r) return;
  r.status = r.status==='done'?'pending':'done';
  render();
  toast(r.status==='done'?'✅ Marked as completed':'⏳ Marked as pending');
}

function deleteRespondent(id) {
  if (!confirm('Remove this respondent?')) return;
  state.respondents = state.respondents.filter(r=>r.id!==id);
  render();
  toast('🗑 Respondent removed');
}

function deleteProject(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this project and all its respondents?')) return;
  state.respondents = state.respondents.filter(r=>r.projectId!==id);
  state.projects = state.projects.filter(p=>p.id!==id);
  if (state.activeProject===id) state.activeProject = state.projects[0]?.id||null;
  render();
  toast('📁 Project deleted');
}

/* ─────────────────────────── MODALS ─────────────────────────── */
function openRespondentModal(id=null) {
  editingId = id;
  const modal = document.getElementById('respondentModal');
  const r = id ? state.respondents.find(x=>x.id===id) : null;
  document.getElementById('respModalTitle').textContent = id ? 'Edit Respondent' : 'Add Respondent';
  document.getElementById('inp-name').value    = r?.name||'';
  document.getElementById('inp-email').value   = r?.email||'';
  document.getElementById('inp-contact').value = r?.contact||'';
  document.getElementById('inp-status').value  = r?.status||'pending';
  // populate projects
  const sel = document.getElementById('inp-project');
  sel.innerHTML = state.projects.map(p=>`<option value="${p.id}" ${(r?.projectId||state.activeProject)===p.id?'selected':''}>${p.name}</option>`).join('');
  modal.classList.add('open');
  document.getElementById('inp-name').focus();
}

function editRespondent(id) { openRespondentModal(id); }

function saveRespondent() {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) { toast('⚠️ Name is required', true); return; }
  if (editingId) {
    const r = state.respondents.find(x=>x.id===editingId);
    r.name    = name;
    r.email   = document.getElementById('inp-email').value.trim();
    r.contact = document.getElementById('inp-contact').value.trim();
    r.projectId = document.getElementById('inp-project').value;
    r.status  = document.getElementById('inp-status').value;
    toast('✏️ Respondent updated');
  } else {
    state.respondents.push({
      id: 'r' + Date.now(),
      name,
      email:   document.getElementById('inp-email').value.trim(),
      contact: document.getElementById('inp-contact').value.trim(),
      projectId: document.getElementById('inp-project').value || state.activeProject,
      status:  document.getElementById('inp-status').value,
      added:   new Date().toISOString().slice(0,10)
    });
    toast('👤 Respondent added');
  }
  closeModals();
  render();
}

function openProjectModal() {
  document.getElementById('inp-proj-name').value = '';
  document.getElementById('inp-proj-desc').value = '';
  document.getElementById('projectModal').classList.add('open');
  document.getElementById('inp-proj-name').focus();
}

function saveProject() {
  const name = document.getElementById('inp-proj-name').value.trim();
  if (!name) { toast('⚠️ Project name required', true); return; }
  const p = { id:'p'+Date.now(), name, desc: document.getElementById('inp-proj-desc').value.trim() };
  state.projects.push(p);
  state.activeProject = p.id;
  closeModals();
  render();
  toast('📁 Project created!');
}

function closeModals() {
  document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('open'));
}

// Close modal on backdrop click
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click', e=>{ if(e.target===o) closeModals(); });
});

// Keyboard shortcuts
document.addEventListener('keydown', e=>{
  if (e.key==='Escape') closeModals();
});

/* ─────────────────────────── TOAST ─────────────────────────── */
function toast(msg, err=false) {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.borderLeftColor = err?'var(--danger)':'var(--accent3)';
  el.style.borderLeftWidth = '3px';
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.classList.add('hide'); setTimeout(()=>el.remove(), 300); }, 2800);
}

/* ─────────────────────────── BOOT ─────────────────────────── */
render();
</script>
</body>
</html>
